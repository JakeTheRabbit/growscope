name: GrowScope
version: 0.2.1
slug: growscope
description: Grow analytics engine. Automatic timelapse capture from any HA camera, grow registry, sensor recording to InfluxDB.
url: https://github.com/JakeTheRabbit/growscope
arch:
  - aarch64
  - amd64
init: false
ingress: true
panel_icon: mdi:sprout
panel_title: GrowScope
homeassistant_api: true
map:
  - type: media
    read_only: false
options:
  log_level: info
  seconds_per_day: 2.0
schema:
  log_level: list(debug|info|warning|error)?
  seconds_per_day: float?
