name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 0"

jobs:
  hassfest:
    name: Hassfest (integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation (integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands

  addon-lint:
    name: Add-on lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: frenck/action-addon-linter@v2
        with:
          path: "./growscope"

  engine-compile:
    name: Engine syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m compileall growscope/app custom_components/growscope
